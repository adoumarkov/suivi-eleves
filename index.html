<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondage Difficultés - Maths & PC</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f3f4f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); padding: 15px; color: #333; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 20px; }
        .step { display: none; }
        .step.active { display: block; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        /* Style des leçons cliquables */
        .lesson-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 2px solid #e5e7eb; padding: 12px;
            margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .lesson-item.selected { border-color: var(--primary-color); background: #eff6ff; }
        .rank-badge {
            background: var(--primary-color); color: white; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; visibility: hidden;
        }
        .lesson-item.selected .rank-badge { visibility: visible; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-next { background: var(--primary-color); color: white; }
        .btn-send { background: #059669; color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Espace Élèves</h2>
    <p class="subtitle">Classe tes difficultés (1 = le plus dur)</p>
    
    <form id="student-form">
        <div class="step active" id="step1">
            <label>Ton Nom Complet :</label>
            <input type="text" id="student_name" placeholder="Ex: Jean Kouassi" required>
            
            <label>Ta Classe :</label>
            <select id="student_class" required onchange="updateLessons()">
                <option value="">-- Choisis ta classe --</option>
                <option value="5eme">Cinquième (5ème)</option>
                <option value="4eme">Quatrième (4ème)</option>
                <option value="3eme">Troisième (3ème)</option>
                <option value="2ndeC">Seconde C</option>
                <option value="TerminaleD">Terminale D</option>
            </select>
            <button type="button" class="btn-next" onclick="nextStep()">Continuer</button>
        </div>

        <div class="step" id="step2">
            <h3 id="display-class" style="color: #4b5563; font-size: 1.1em;"></h3>
            
            <label style="display: block; font-weight: bold; color: #1f2937;">
                MATHS : Faites le classement des leçons que vous trouvez difficiles à comprendre
            </label>
            <p style="font-size: 0.85em; color: #6b7280; margin-top: 4px; margin-bottom: 10px;">
                (Cliquez pour ajouter. Les premières leçons de la liste les plus difficiles)
            </p>
            <div id="math-lessons"></div>

            <br>

            <label style="display: block; font-weight: bold; color: #1f2937;">
                PHYSIQUE-CHIMIE : Faites le classement des leçons que vous trouvez difficiles à comprendre
            </label>
            <p style="font-size: 0.85em; color: #6b7280; margin-top: 4px; margin-bottom: 10px;">
                (Cliquez pour ajouter. Les premières leçons de la liste les plus difficiles)
            </p>
            <div id="pc-lessons"></div>

            <button type="submit" class="btn-send">Envoyer mon classement</button>
        </div>
    </form>
</div>

    let selectedMaths = [];
    let selectedPC = [];

    function updateLessons() {
        const classe = document.getElementById('student_class').value;
        const mathDiv = document.getElementById('math-lessons');
        const pcDiv = document.getElementById('pc-lessons');
        mathDiv.innerHTML = ""; pcDiv.innerHTML = "";
        selectedMaths = []; selectedPC = [];

        if(program[classe]) {
            program[classe].maths.forEach(lesson => mathDiv.appendChild(createLessonEl(lesson, 'maths')));
            program[classe].pc.forEach(lesson => pcDiv.appendChild(createLessonEl(lesson, 'pc')));
        }
    }

    function createLessonEl(name, type) {
        const div = document.createElement('div');
        div.className = 'lesson-item';
        div.innerHTML = `<span>${name}</span><div class="rank-badge"></div>`;
        div.onclick = () => toggleLesson(div, name, type);
        return div;
    }

    function toggleLesson(element, name, type) {
        let list = (type === 'maths') ? selectedMaths : selectedPC;
        const index = list.indexOf(name);

        if (index > -1) {
            list.splice(index, 1);
            element.classList.remove('selected');
        } else {
            list.push(name);
            element.classList.add('selected');
        }
        
        // Mettre à jour les numéros
        const container = element.parentElement;
        const items = container.querySelectorAll('.lesson-item');
        items.forEach(item => {
            const lessonName = item.querySelector('span').innerText;
            const rank = list.indexOf(lessonName);
            const badge = item.querySelector('.rank-badge');
            if (rank > -1) {
                item.classList.add('selected');
                badge.innerText = rank + 1;
            } else {
                item.classList.remove('selected');
            }
        });
    }

    function nextStep() {
        if(document.getElementById('student_name').value && document.getElementById('student_class').value) {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('display-class').innerText = "Classe : " + document.getElementById('student_class').value;
        }
    }

    document.getElementById('student-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Création du texte pour le mail
        const mathsTxt = selectedMaths.map((n, i) => `${i+1}. ${n}`).join(" / ") || "Aucune difficulté";
        const pcTxt = selectedPC.map((n, i) => `${i+1}. ${n}`).join(" / ") || "Aucune difficulté";

        emailjs.send('service_fhn0sjt', 'template_6m98e5q', {
            nom: document.getElementById('student_name').value,
            classe: document.getElementById('student_class').value,
            maths: mathsTxt,
            pc: pcTxt
        }).then(() => {
            alert('Envoi réussi !');
            location.reload();
        });
    });
</script>
</body>
</html>
